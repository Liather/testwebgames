<!DOCTYPE html>
<html>

    <head>
        <title>Game page</title>
        <link rel="stylesheet" href="/game/bananagrams/game.css">
        <link rel="icon" type="image/x-icon" href="/game/bananagrams/favicon.ico">
    </head>

    <body>
        <div id="tileTrayContainer">
            <h4 id="tileTray">Tiles loading...</h4>
        </div>

        <div id="boardContainer">
            <div id="board"></div>
        </div>

        <div id="controls">
            <button id="peelButton">Peel</button>

            <div id="directionControls">
                <button id="upButton">↑</button>
                <button id="leftButton">←</button>
                <button id="rightButton">→</button>
                <button id="downButton">↓</button>
            </div>
        </div>

            // PEEL BUTTON

        <script src="/game/bananagrams/game.js"></script>
